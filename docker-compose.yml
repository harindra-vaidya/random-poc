version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: weather-metrics-db
    environment:
      POSTGRES_DB: weather_metrics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: