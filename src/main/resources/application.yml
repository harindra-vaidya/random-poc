spring:
  application:
    name: weather-metrics-api

  datasource:
    url: jdbc:postgresql://localhost:5432/weather_metrics
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.sensor.weathermetrics: DEBUG
    org.hibernate.SQL: DEBUG